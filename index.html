<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>My Personal Downloader</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #252525; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 300px; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #333; color: white; margin-bottom: 20px; }
        button { padding: 12px 25px; background: #ff0000; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #cc0000; }
        #status { margin-top: 20px; color: #aaa; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>YouTube Downloader</h2>
        <form method="POST" onsubmit="showStatus()">
            <input type="text" name="url" placeholder="Вставьте ссылку на YouTube" required>
            <br>
            <button type="submit">СКАЧАТЬ ВИДЕО</button>
        </form>
        <div id="status">Начинаю скачивание... Пожалуйста, подождите (это может занять время).</div>
    </div>

    <script>
        function showStatus() {
            document.getElementById('status').style.display = 'block';
        }
    </script>
</body>
</html>
